<script>
    function getGiscusTheme() {
        return document.documentElement.classList.contains('dark') ? 'noborder_gray' : 'noborder_light';
    }

    function setGiscusTheme(theme) {
        const iframe = document.querySelector('iframe.giscus-frame');
        if (iframe) {
            iframe.contentWindow.postMessage(
                { giscus: { setConfig: { theme: theme } } },
                'https://giscus.app'
            );
            return true;
        }
        return false;
    }

    // Watch for theme toggle changes
    const observer = new MutationObserver(() => {
        setGiscusTheme(getGiscusTheme());
    });
    observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });

    // Poll for iframe and set initial theme
    function syncInitialTheme() {
        if (!setGiscusTheme(getGiscusTheme())) {
            setTimeout(syncInitialTheme, 100);
        }
    }

    // Start polling after a short delay to let Giscus load
    setTimeout(syncInitialTheme, 500);
</script>
